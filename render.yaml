services:
  - type: web
    name: linkup-api
    runtime: node
    rootDir: .
    plan: free
    autoDeploy: true
    buildCommand: npm install --include=dev && npm run build -w @linkup/server
    startCommand: NODE_ENV=production npm run start -w @linkup/server
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        value: https://linkup-client-rt8y.onrender.com
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: COOKIE_NAME
        value: linkup_refresh
      - key: COOKIE_SECURE
        value: true
      - key: STUN_URL
        value: stun:stun.l.google.com:19302
      - key: TURN_URL
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false

  - type: web
    name: linkup-client
    runtime: static
    rootDir: .
    buildCommand: npm install --include=dev && npm run build -w @linkup/client
    staticPublishPath: apps/client/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://linkup-api-8xz4.onrender.com/api/v1
      - key: VITE_SOCKET_URL
        value: https://linkup-api-8xz4.onrender.com
      - key: VITE_STUN_URL
        value: stun:stun.l.google.com:19302
      - key: VITE_TURN_URL
        sync: false
      - key: VITE_TURN_USERNAME
        sync: false
      - key: VITE_TURN_CREDENTIAL
        sync: false
